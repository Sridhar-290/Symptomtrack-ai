<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — MediVision AI</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--orange:#FF6B2B;--orange-light:#FF8C5A;--orange-pale:#FFF0E8;--cream:#FFFAF6;--gray-900:#111827;--gray-600:#4B5563;--gray-400:#9CA3AF;--gray-200:#E5E7EB;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;overflow-x:hidden;}
.bg-circles{position:fixed;inset:0;pointer-events:none;}
.circle{position:absolute;border-radius:50%;opacity:0.06;}
.circle-1{width:500px;height:500px;background:var(--orange);top:-150px;left:-150px;animation:float 9s ease-in-out infinite;}
.circle-2{width:350px;height:350px;background:var(--orange-light);bottom:-100px;right:-100px;animation:float 7s ease-in-out infinite reverse;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}

.auth-card{
  background:white;border-radius:24px;width:100%;max-width:440px;
  padding:40px;position:relative;z-index:10;
  box-shadow:0 24px 64px rgba(0,0,0,0.08);
  border:1px solid rgba(255,107,43,0.08);
  animation:slideUp 0.5s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.auth-logo{text-align:center;margin-bottom:28px;}
.logo-icon{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,var(--orange),var(--orange-light));display:flex;align-items:center;justify-content:center;font-size:26px;color:white;margin:0 auto 12px;box-shadow:0 8px 24px rgba(255,107,43,0.3);}
.auth-title{font-size:22px;font-weight:800;color:var(--gray-900);}
.auth-subtitle{font-size:13px;color:var(--gray-400);margin-top:4px;}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--gray-900);margin-bottom:6px;}
.input-wrap{position:relative;}
.input-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--gray-400);font-size:13px;}
.form-control{
  width:100%;padding:11px 12px 11px 36px;
  border:1.5px solid var(--gray-200);border-radius:10px;
  font-family:inherit;font-size:13.5px;color:var(--gray-900);
  background:white;outline:none;transition:all 0.2s;
}
.form-control:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,107,43,0.1);}
.form-control::placeholder{color:var(--gray-400);}
.eye-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--gray-400);font-size:13px;background:none;border:none;}
.eye-toggle:hover{color:var(--orange);}

/* Password strength */
.pw-strength{margin-top:6px;display:flex;gap:4px;}
.pw-bar{flex:1;height:4px;border-radius:2px;background:var(--gray-200);transition:background 0.3s;}
.pw-bar.weak{background:#EF4444;} .pw-bar.medium{background:#F59E0B;} .pw-bar.strong{background:#10B981;}
.pw-text{font-size:11px;margin-top:4px;font-weight:500;}
.pw-text.weak{color:#EF4444;} .pw-text.medium{color:#F59E0B;} .pw-text.strong{color:#10B981;}

.btn-signup{
  width:100%;padding:13px;border-radius:12px;border:none;
  background:linear-gradient(135deg,var(--orange),var(--orange-light));
  color:white;font-family:inherit;font-size:15px;font-weight:700;
  cursor:pointer;box-shadow:0 6px 20px rgba(255,107,43,0.3);
  transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:8px;
}
.btn-signup:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(255,107,43,0.35);}

.terms{font-size:11px;color:var(--gray-400);text-align:center;margin-top:12px;}
.terms a{color:var(--orange);}
.divider{text-align:center;position:relative;margin:18px 0;}
.divider::before{content:'';position:absolute;left:0;top:50%;right:0;height:1px;background:var(--gray-200);}
.divider span{background:white;padding:0 12px;font-size:12px;color:var(--gray-400);position:relative;}
.auth-link{text-align:center;font-size:13px;color:var(--gray-600);}
.auth-link a{color:var(--orange);font-weight:700;text-decoration:none;}

.alert{padding:10px 14px;border-radius:10px;font-size:13px;font-weight:500;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.alert-error{background:#FEF2F2;color:#991B1B;border:1px solid #FEE2E2;}
</style>
</head>
<body>
<div class="bg-circles"><div class="circle circle-1"></div><div class="circle circle-2"></div></div>

<div class="auth-card">
  <div class="auth-logo">
    <div class="logo-icon"><i class="fas fa-user-plus"></i></div>
    <div class="auth-title">Create your account</div>
    <div class="auth-subtitle">Join MediVision AI for free</div>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
  <div class="alert alert-{{ cat }}"><i class="fas fa-exclamation-circle"></i>{{ msg }}</div>
  {% endfor %}
  {% endwith %}

  <form method="POST" action="/signup" id="signupForm">
    <div class="form-group">
      <label class="form-label">Username</label>
      <div class="input-wrap">
        <i class="fas fa-user"></i>
        <input type="text" name="username" class="form-control" placeholder="Choose a username" required autocomplete="off">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <div class="input-wrap">
        <i class="fas fa-envelope"></i>
        <input type="email" name="email" class="form-control" placeholder="your@email.com">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" name="password" id="password" class="form-control" placeholder="Create a strong password" required oninput="checkStrength(this.value)">
        <button type="button" class="eye-toggle" onclick="togglePw()"><i class="fas fa-eye" id="eyeIcon"></i></button>
      </div>
      <div class="pw-strength" id="pwBars">
        <div class="pw-bar" id="b1"></div>
        <div class="pw-bar" id="b2"></div>
        <div class="pw-bar" id="b3"></div>
        <div class="pw-bar" id="b4"></div>
      </div>
      <div class="pw-text" id="pwText"></div>
    </div>
    <button type="submit" class="btn-signup" id="signupBtn">
      <i class="fas fa-user-plus"></i> Create Account
    </button>
  </form>
  <p class="terms">By signing up, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></p>
  <div class="divider"><span>already have an account?</span></div>
  <div class="auth-link"><a href="/login"><i class="fas fa-sign-in-alt"></i> Login to MediVision</a></div>
</div>

<script>
function checkStrength(v) {
  const bars = ['b1','b2','b3','b4'];
  const txt = document.getElementById('pwText');
  let score = 0;
  if (v.length >= 6) score++;
  if (v.length >= 10) score++;
  if (/[A-Z]/.test(v) && /[a-z]/.test(v)) score++;
  if (/[0-9!@#$%^&*]/.test(v)) score++;
  const cls = score<=1?'weak':score<=2?'medium':'strong';
  const labels = ['','Weak','Fair','Good','Strong'];
  bars.forEach((b,i) => {
    document.getElementById(b).className = 'pw-bar' + (i < score ? ` ${cls}` : '');
  });
  txt.textContent = v.length > 0 ? labels[score] || 'Strong' : '';
  txt.className = 'pw-text ' + cls;
}
function togglePw() {
  const pw = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  pw.type = pw.type==='password'?'text':'password';
  icon.className = pw.type==='password'?'fas fa-eye':'fas fa-eye-slash';
}
document.getElementById('signupForm').addEventListener('submit', () => {
  const btn = document.getElementById('signupBtn');
  btn.innerHTML = '<span style="width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;"></span> Creating...';
  btn.disabled = true;
});
</script>
<style>@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}</style>
</body>
</html>
